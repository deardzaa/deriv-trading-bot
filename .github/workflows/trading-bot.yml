name: Deriv Trading Bot

on:
  schedule:
    # tiap 15 menit. GitHub minimum interval cron adalah 5 menit, tapi jadwal
    # bisa delay beberapa menit saat jam sibuk - ini normal, bukan bug.
    - cron: '*/15 * * * *'
  workflow_dispatch: {}  # biar bisa di-trigger manual dari tab Actions

# Kalau cron eksternal (misal cron-job.org) trigger tiap 1 menit, run bisa
# tumpang tindih (run baru mulai sebelum run lama commit+push selesai) -
# ini bikin push kedua ditolak (race condition). "concurrency" bikin run
# yang numpuk ANTRE (jalan satu-satu berurutan), bukan bareng-bareng.
concurrency:
  group: deriv-trading-bot-run
  cancel-in-progress: false

permissions:
  contents: write  # perlu buat commit balik trades.json/ticks_dataset.csv

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot (satu kali, lalu selesai)
        env:
          DERIV_API_TOKEN: ${{ secrets.DERIV_API_TOKEN }}
          DERIV_APP_ID: ${{ secrets.DERIV_APP_ID }}
        run: python bot_once.py

      - name: Commit hasil trade & dataset
        run: | git config user.name "deriv-bot" git config user.email "bot@users.noreply.github.com" git add trades.json 2>&1 || echo "gagal add trades.json (mungkin belum ada)" git add ticks_dataset.csv 2>&1 || echo "gagal add ticks_dataset.csv (mungkin belum ada)" git add shadow_predictions.json 2>&1 || echo "gagal add shadow_predictions.json (mungkin belum ada)" git diff --cached --quiet && echo "Nggak ada perubahan buat di-commit." && exit 0 git commit -m "Update trade log [skip ci]" 
          # Retry push dengan pull --rebase dulu, buat jaga-jaga kalau
          # "concurrency" di atas nggak sepenuhnya nyegah race condition
          # (misal ada run lama yang masih nyantol).
          for i in 1 2 3 4 5; do
            if git push; then
              echo "Push berhasil di percobaan ke-$i."
              exit 0
            fi
            echo "Push gagal (percobaan $i/5), pull --rebase lalu coba lagi..."
            git pull --rebase origin main
            sleep 3
          done
          echo "Push tetap gagal setelah 5x percobaan."
          exit 1
