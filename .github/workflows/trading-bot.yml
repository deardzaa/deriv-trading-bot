name: Deriv Trading Bot

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

concurrency:
  group: deriv-trading-bot-run
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot (satu kali, lalu selesai)
        env:
          DERIV_API_TOKEN: ${{ secrets.DERIV_API_TOKEN }}
          DERIV_APP_ID: ${{ secrets.DERIV_APP_ID }}
        run: python bot_once.py

      - name: Commit hasil trade & dataset
        run: |
          git config user.name "deriv-bot"
          git config user.email "bot@users.noreply.github.com"
          git add trades.json 2>&1 || echo "belum ada trades.json"
          git add ticks_dataset.csv 2>&1 || echo "belum ada ticks_dataset.csv"
          git add shadow_predictions.json 2>&1 || echo "belum ada shadow_predictions.json"
          git diff --cached --quiet && echo "Tidak ada perubahan." && exit 0
          git commit -m "Update trade log [skip ci]"
          for i in 1 2 3 4 5; do
            if git push; then
              echo "Push berhasil di percobaan ke-$i."
              exit 0
            fi
            echo "Push gagal (percobaan $i/5), pull rebase lalu coba lagi..."
            git pull --rebase origin main
            sleep 3
          done
          echo "Push tetap gagal setelah 5x percobaan."
          exit 1
