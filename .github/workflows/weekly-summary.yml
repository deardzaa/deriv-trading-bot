name: Weekly Trading Summary (Gemini)

on:
  schedule:
    - cron: '0 8 * * 1'  # tiap Senin jam 08:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  summarize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate summary
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python gemini_summary.py

      - name: Commit summary
        run: |
          git config user.name "deriv-bot"
          git config user.email "bot@users.noreply.github.com"
          git add weekly_summary.md
          git diff --cached --quiet || git commit -m "Weekly summary [skip ci]"
          git push
