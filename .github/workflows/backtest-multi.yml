name: Backtest Multi-Indicator Strategy

on:
  workflow_dispatch: {}

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Backtest strategi multi-indikator (voting/consensus)
        run: python backtest_multi_indicator.py
