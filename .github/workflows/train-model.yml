name: Train AI Model

on:
  workflow_dispatch:
    inputs:
      fetch_fresh_history:
        description: 'Tarik histori tick baru dulu sebelum training? (yes/no)'
        required: false
        default: 'no'
      history_count:
        description: 'Jumlah tick historis yang ditarik (kalau fetch_fresh_history=yes)'
        required: false
        default: '5000'

permissions:
  contents: write

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch fresh tick history (opsional)
        if: ${{ github.event.inputs.fetch_fresh_history == 'yes' }}
        env:
          DERIV_API_TOKEN: ${{ secrets.DERIV_API_TOKEN }}
          DERIV_APP_ID: ${{ secrets.DERIV_APP_ID }}
        run: python fetch_history.py ${{ github.event.inputs.history_count }}

      - name: Analisis apakah data punya pola asli (statistical test)
        run: python analyze_randomness.py

      - name: Train model
        run: python train_model.py

      - name: Commit model & dataset yang ter-update
        run: |
          git config user.name "deriv-bot"
          git config user.email "bot@users.noreply.github.com"
          git add model.pkl ticks_dataset.csv 2>/dev/null || true
          git diff --cached --quiet && echo "Tidak ada perubahan." && exit 0
          git commit -m "Update AI model [skip ci]"
          for i in 1 2 3 4 5; do
            if git push; then
              echo "Push berhasil di percobaan ke-$i."
              exit 0
            fi
            echo "Push gagal (percobaan $i/5), pull rebase lalu coba lagi..."
            git pull --rebase origin main
            sleep 3
          done
          echo "Push tetap gagal setelah 5x percobaan."
          exit 1
